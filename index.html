<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ziua Elarei</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcfa;
            --text: #1c1c1e;
            --text-2: #6e6e73;
            --text-3: #aeaeb2;
            --pink: #e8697a;
            --green: #34c759;
            --surface: rgba(255,255,255,0.68);
            --border: rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
        }

        /* Background */
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 20% 10%, rgba(255,210,218,0.22) 0%, transparent 65%),
                radial-gradient(ellipse 60% 45% at 85% 85%, rgba(200,245,215,0.2) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 60% 40%, rgba(255,245,230,0.25) 0%, transparent 65%);
            background-color: var(--bg);
        }

        /* Stickers */
        .sticker {
            position: fixed; pointer-events: none; z-index: 1; object-fit: contain;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.08));
            animation: float ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0) rotate(var(--rot)); }
            50%      { transform: translateY(-7px) rotate(var(--rot)); }
        }

        /* Screen */
        .screen {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly;
            padding: 24px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .cake {
            font-size: clamp(2rem, 8vw, 3rem);
            display: inline-block;
            animation: wobble 3s ease-in-out infinite;
            margin-bottom: 8px;
        }
        @keyframes wobble { 0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);} }

        .eyebrow {
            font-size: clamp(0.62rem, 2.2vw, 0.72rem);
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--pink);
            margin-bottom: 6px;
        }
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.4rem, 11vw, 4rem);
            font-weight: 400;
            line-height: 1.0;
            color: var(--text);
            letter-spacing: -0.03em;
        }
        h1 em {
            font-style: italic;
            color: var(--pink);
        }
        .subtitle {
            font-size: clamp(0.78rem, 2.8vw, 0.9rem);
            color: var(--text-3);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        /* Cards */
        .cards {
            display: flex; gap: 12px;
            width: 100%; max-width: 420px;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s both;
        }
        .card {
            flex: 1; border-radius: 22px;
            padding: clamp(16px,4.5vw,24px) clamp(12px,3vw,18px);
            text-align: center; text-decoration: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: var(--surface);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.5) inset;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
        }
        .card:active { transform: scale(0.96); box-shadow: 0 1px 6px rgba(0,0,0,0.08); }

        .card-animal {
            width: clamp(56px,16vw,88px); height: clamp(56px,16vw,88px);
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.09));
            animation: float ease-in-out infinite;
        }
        .card-camera .card-animal { animation-duration: 2.6s; }
        .card-gallery .card-animal { animation-duration: 3.1s; animation-delay: 0.4s; }

        .card-label {
            font-size: clamp(0.78rem, 2.8vw, 0.9rem);
            font-weight: 500; color: var(--text-2);
            letter-spacing: -0.01em;
        }
        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 400; color: var(--text);
            letter-spacing: -0.02em; line-height: 1.15;
        }
        /* Minimal pill — no gradient */
        .card-cta {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: clamp(0.72rem, 2.4vw, 0.82rem);
            font-weight: 600; letter-spacing: -0.01em;
        }
        .card-camera .card-cta { background: rgba(232,105,122,0.1); color: var(--pink); }
        .card-gallery .card-cta { background: rgba(52,199,89,0.1);  color: #1d8a3c; }

        /* Footer */
        .footer {
            text-align: center;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s both;
        }
        .footer-heart {
            font-size: clamp(0.75rem, 2.6vw, 0.88rem);
            color: var(--text-3); font-weight: 400; letter-spacing: -0.01em;
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <!-- Stickers -->
    <img src="61e5c12a-b99c-4121-bc68-9a092b484377.png" class="sticker" style="width:48px;top:3%;left:7%;--rot:-22deg;animation-duration:3.1s;animation-delay:0s;opacity:0.40;">
    <img src="8253a088-3266-48ce-812d-2e44ced702d3.png" class="sticker" style="width:62px;top:5%;left:60%;--rot:14deg;animation-duration:2.8s;animation-delay:0.7s;opacity:0.40;">
    <img src="d3f58b6a-b357-400b-8ad1-885dfd0e2900.png" class="sticker" style="width:50px;top:9%;left:33%;--rot:-8deg;animation-duration:3.5s;animation-delay:0.3s;opacity:0.36;">
    <img src="b5591582-6b09-4735-b732-c1481db7e05a.png" class="sticker" style="width:56px;top:12%;left:80%;--rot:-30deg;animation-duration:2.6s;animation-delay:1.1s;opacity:0.38;">
    <img src="3e637e7a-e1e1-49e3-8b77-fcd5dc61ca5b.png" class="sticker" style="width:66px;top:22%;left:4%;--rot:20deg;animation-duration:4s;animation-delay:0.5s;opacity:0.34;">
    <img src="64921c0f-9b1b-443f-a621-ad8bd47c8949.png" class="sticker" style="width:46px;top:26%;left:50%;--rot:-15deg;animation-duration:3.2s;animation-delay:1.4s;opacity:0.36;">
    <img src="fbf06e1a-ed14-4ac5-9dfd-ca9a3d79e6d4.png" class="sticker" style="width:58px;top:30%;left:76%;--rot:35deg;animation-duration:2.9s;animation-delay:0.2s;opacity:0.34;">
    <img src="2a2a47c3-043b-4c5f-a935-380042c91e17.png" class="sticker" style="width:44px;top:42%;left:14%;--rot:-18deg;animation-duration:3.6s;animation-delay:0.9s;opacity:0.38;">
    <img src="65189b18-95f1-47fa-9dd1-a1665ad10f48.png" class="sticker" style="width:60px;top:55%;left:42%;--rot:28deg;animation-duration:3.3s;animation-delay:1.6s;opacity:0.32;">
    <img src="e80ac0ef-d369-4110-b0d1-7228cd6d5ef3.png" class="sticker" style="width:52px;top:60%;left:22%;--rot:-10deg;animation-duration:2.7s;animation-delay:0.4s;opacity:0.36;">
    <img src="05d4c5cf-73e5-4da8-baae-24bb68af598b.png" class="sticker" style="width:48px;top:63%;left:68%;--rot:40deg;animation-duration:3.8s;animation-delay:1.2s;opacity:0.36;">
    <img src="d3f58b6a-b357-400b-8ad1-885dfd0e2900.png" class="sticker" style="width:52px;top:75%;left:55%;--rot:-25deg;animation-duration:2.5s;animation-delay:1s;opacity:0.34;">
    <img src="8253a088-3266-48ce-812d-2e44ced702d3.png" class="sticker" style="width:54px;top:80%;left:8%;--rot:12deg;animation-duration:3.4s;animation-delay:0.8s;opacity:0.36;">
    <img src="b5591582-6b09-4735-b732-c1481db7e05a.png" class="sticker" style="width:42px;top:86%;left:78%;--rot:-35deg;animation-duration:3.1s;animation-delay:1.5s;opacity:0.34;">

    <div class="screen">
        <header class="header">
            <div class="cake">🎂</div>
            <p class="eyebrow">Prima aniversare</p>
            <h1>La mulți ani,<br><em>Ela!</em></h1>
            <p class="subtitle">Capturează magia primului an</p>
        </header>

        <main class="cards">
            <a href="camera2.html" class="card card-camera">
                <img src="64921c0f-9b1b-443f-a621-ad8bd47c8949.png" class="card-animal" alt="">
                <p class="card-label">Fotografie & Video</p>
                <h2 class="card-title">Cameră</h2>
                <span class="card-cta">Deschide →</span>
            </a>
            <a href="gallery.html" class="card card-gallery">
                <img src="fbf06e1a-ed14-4ac5-9dfd-ca9a3d79e6d4.png" class="card-animal" alt="">
                <p class="card-label">Toate amintirile</p>
                <h2 class="card-title">Album</h2>
                <span class="card-cta">Vezi →</span>
            </a>
        </main>

        <footer class="footer">
            <p class="footer-heart">Creat cu drag pentru Ela ♡</p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function(e) {
                e.preventDefault();
                this.style.transform = 'scale(0.95)';
                setTimeout(() => { window.location.href = this.href; }, 160);
            });
        });
        let lastTouch = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouch <= 300) e.preventDefault();
            lastTouch = now;
        }, false);
    </script>
</body>
</html>
