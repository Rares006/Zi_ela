<html lang="ro">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f5;
            --surface: rgba(255,255,255,0.75);
            --border: rgba(0,0,0,0.07);
            --text: #1a1a1a;
            --text-2: #6e6e73;
            --text-3: #aeaeb2;
            --accent: #e8697a;
            --green: #34c759;
            --blue: #007aff;
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        html,body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',-apple-system,sans-serif; background:var(--bg); }

        .bg { position:fixed; inset:0; z-index:0;
            background: radial-gradient(ellipse 60% 40% at 15% 8%, rgba(255,200,200,0.16) 0%, transparent 70%),
                        radial-gradient(ellipse 50% 35% at 88% 88%, rgba(200,240,210,0.14) 0%, transparent 70%);
            background-color:var(--bg); }

        .sticker { position:fixed; pointer-events:none; z-index:1; object-fit:contain;
            filter:drop-shadow(0 2px 8px rgba(0,0,0,0.06)); animation:stickerFloat ease-in-out infinite; }
        @keyframes stickerFloat { 0%,100%{transform:translateY(0) rotate(var(--rot));} 50%{transform:translateY(-6px) rotate(var(--rot));} }

        .top-bar { position:fixed; top:0; left:0; right:0; height:54px;
            display:flex; align-items:center; justify-content:space-between; padding:0 18px; z-index:50; }
        .back-button { display:flex; align-items:center; gap:2px; color:var(--accent);
            font-size:0.93rem; font-weight:500; text-decoration:none; padding:6px 0; letter-spacing:-0.01em; }
        .back-button::before { content:'‹'; font-size:1.4rem; line-height:1; }
        #authStatus { font-size:0.68rem; font-weight:500; color:var(--text-3); letter-spacing:0.01em; }

        .screen { position:relative; z-index:2; width:100%; height:100%;
            display:flex; flex-direction:column; align-items:center;
            padding:62px 16px 16px; gap:10px; }

        .page-header { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .header-animal { width:clamp(34px,9vw,46px); height:clamp(34px,9vw,46px); object-fit:contain;
            filter:drop-shadow(0 3px 6px rgba(0,0,0,0.07)); animation:bob 3s ease-in-out infinite; }
        @keyframes bob { 0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);} }
        h1 { font-family:'DM Serif Display',serif; font-size:clamp(1.25rem,5vw,1.65rem);
            font-weight:400; color:var(--text); letter-spacing:-0.025em; }

        .media-area { flex:1; width:100%; position:relative; min-height:0; border-radius:22px; overflow:hidden; }

        #video { width:100%; height:100%; object-fit:cover; border-radius:22px; display:none; }
        #previewVideo { width:100%; height:100%; object-fit:contain; border-radius:22px; background:#000; display:none; }
        #previewImage { width:100%; height:100%; object-fit:cover; border-radius:22px; display:none; }

        #tapToStart { position:absolute; inset:0; border-radius:22px;
            border:1.5px dashed rgba(0,0,0,0.10); background:var(--surface);
            backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:8px; cursor:pointer; transition:background 0.18s; }
        #tapToStart:active { background:rgba(255,255,255,0.9); }
        .tap-icon { font-size:clamp(2.2rem,9vw,3rem); animation:bob 2.5s ease-in-out infinite; line-height:1; }
        .tap-text { font-size:clamp(0.88rem,3.2vw,1rem); font-weight:500; color:var(--text);
            text-align:center; padding:0 24px; letter-spacing:-0.015em; }
        .tap-sub { font-size:clamp(0.72rem,2.4vw,0.8rem); color:var(--text-3); font-weight:400; }

        #info { font-size:0.86rem; font-weight:400; color:var(--text-2); text-align:center;
            padding:10px 16px; background:var(--surface); backdrop-filter:blur(8px);
            border-radius:12px; width:100%; border:1px solid var(--border);
            display:none; letter-spacing:-0.01em; }

        #progressContainer { width:100%; background:rgba(0,0,0,0.05); border-radius:50px;
            display:none; overflow:hidden; height:3px; flex-shrink:0; }
        #progressBar { height:3px; background:var(--accent); border-radius:50px; width:0%; transition:width 0.4s ease; }

        #buttonContainer { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; width:100%; flex-shrink:0; }

        button { font-family:'DM Sans',-apple-system,sans-serif; font-weight:500;
            font-size:clamp(0.82rem,2.8vw,0.9rem); padding:11px 22px;
            border:none; border-radius:50px; cursor:pointer;
            transition:opacity 0.13s, transform 0.13s; letter-spacing:-0.01em; line-height:1.2; }
        button:active { opacity:0.68; transform:scale(0.96); }
        button:disabled { opacity:0.32; cursor:not-allowed; }

        .btn-dark   { background:var(--text);    color:#fff; }
        .btn-accent { background:var(--accent);  color:#fff; }
        .btn-green  { background:var(--green);   color:#fff; }
        .btn-soft   { background:rgba(0,0,0,0.055); color:var(--text); }
        .btn-blue   { background:rgba(0,122,255,0.1); color:var(--blue); }
        .btn-pink   { background:rgba(232,105,122,0.1); color:var(--accent); }

        .msg { width:100%; text-align:center; flex-shrink:0; font-size:0.82rem; font-weight:500;
            padding:9px 14px; border-radius:10px; display:none; letter-spacing:-0.01em; }
        .msg-error   { color:#c0392b; background:rgba(192,57,43,0.07); border:1px solid rgba(192,57,43,0.12); }
        .msg-success { color:#1a7a36; background:rgba(52,199,89,0.1); border:1px solid rgba(52,199,89,0.18); }
    </style>
</head>
<body>

    <img src="8253a088-3266-48ce-812d-2e44ced702d3.png" class="sticker" style="width:52px;top:88%;left:4%;--rot:12deg;animation-duration:3.4s;animation-delay:0.8s;opacity:0.30;">

    <div class="top-bar">
        <a href="index.html" class="back-button">Înapoi</a>
        <div id="authStatus"></div>
    </div>

    <div class="screen">
        <div class="page-header">
            <img src="64921c0f-9b1b-443f-a621-ad8bd47c8949.png" class="header-animal" alt="">
            <h1>Ziua Elarei</h1>
        </div>

        <div class="media-area">
            <canvas id="canvas" style="display:none;"></canvas>
            <video id="video" autoplay muted playsinline webkit-playsinline></video>
            <video id="previewVideo" controls playsinline webkit-playsinline></video>
            <img id="previewImage" alt="preview">
            <div id="info"></div>
            <div id="tapToStart">
                <span class="tap-icon">📸</span>
                <span class="tap-text">Atinge pentru a porni camera</span>
                <span class="tap-sub">Fă o amintire cu Ela</span>
            </div>
        </div>

        <div class="msg msg-error"   id="errorMessage"></div>
        <div class="msg msg-success" id="successMessage"></div>
        <div id="progressContainer"><div id="progressBar"></div></div>

        <div id="buttonContainer">
            <button id="startButton"        class="btn-dark"   style="display:none;">Start</button>
            <button id="captureButton"      class="btn-dark"   style="display:none;">Fotografiază</button>
            <button id="recordButton"       class="btn-accent" style="display:none;">Înregistrează</button>
            <button id="stopRecordButton"   class="btn-soft"   style="display:none;">Stop</button>
            <button id="repetatiButton"     class="btn-soft"   style="display:none;">Încearcă din nou</button>
            <button id="saveButton"         class="btn-green"  style="display:none;">Salvează</button>
            <button id="downloadButton"     class="btn-blue"   style="display:none;">Descarcă</button>
            <button id="switchCameraButton" class="btn-soft"   style="display:none;">Schimbă camera</button>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-storage-compat.min.js"></script>
    <script>
        let firebaseApp,storage,auth,isAuthenticated=false;
        firebaseApp=firebase.initializeApp(window.firebaseConfig);storage=firebase.storage();auth=firebase.auth();

        let mediaRecorder,chunks=[],useFrontCamera=true,currentStream=null;
        let currentMediaType=null,currentMediaData=null,cameraDeschisa=false;

        const video=document.getElementById('video'),canvas=document.getElementById('canvas');
        const startButton=document.getElementById('startButton'),captureButton=document.getElementById('captureButton');
        const recordButton=document.getElementById('recordButton'),stopRecordButton=document.getElementById('stopRecordButton');
        const repetatiButton=document.getElementById('repetatiButton'),saveButton=document.getElementById('saveButton');
        const downloadButton=document.getElementById('downloadButton'),switchCameraButton=document.getElementById('switchCameraButton');
        const previewImage=document.getElementById('previewImage'),previewVideo=document.getElementById('previewVideo');
        const info=document.getElementById('info'),progressContainer=document.getElementById('progressContainer');
        const progressBar=document.getElementById('progressBar'),errorMessage=document.getElementById('errorMessage');
        const successMessage=document.getElementById('successMessage'),authStatus=document.getElementById('authStatus');

        function getSupportedMimeType(){const t=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];for(let x of t)if(MediaRecorder.isTypeSupported(x))return x;return '';}
        function getRecorderOptions(m,lowQuality){const o={};if(m)o.mimeType=m;o.videoBitsPerSecond=lowQuality?500000:1500000;o.audioBitsPerSecond=lowQuality?64000:128000;return o;}
        async function signInAnonymously(){const c=await auth.signInAnonymously();isAuthenticated=true;authStatus.textContent='Conectat';return c.user;}
        function showError(msg){errorMessage.textContent=msg;errorMessage.style.display='block';successMessage.style.display='none';setTimeout(()=>errorMessage.style.display='none',5000);}
        function showSuccess(msg){successMessage.textContent=msg;successMessage.style.display='block';errorMessage.style.display='none';setTimeout(()=>successMessage.style.display='none',5000);}
        function updateProgress(p){progressBar.style.width=p+'%';}
        function dataURLtoBlob(d){const arr=d.split(','),mime=arr[0].match(/:(.*?);/)[1],bstr=atob(arr[1]);let n=bstr.length;const u=new Uint8Array(n);while(n--)u[n]=bstr.charCodeAt(n);return new Blob([u],{type:mime});}

        function activateCamera(){
            const c={video:{facingMode:useFrontCamera?'user':'environment',width:{ideal:1280},height:{ideal:720},frameRate:{ideal:24}},audio:{echoCancellation:true,channelCount:1}};
            navigator.mediaDevices.getUserMedia(c).then(stream=>{
                currentStream=stream;video.style.transform=useFrontCamera?'rotateY(180deg)':'none';
                video.srcObject=stream;video.play();video.style.display='block';
                cameraDeschisa=true;startButton.style.display='none';
                document.getElementById('tapToStart').style.display='none';
                captureButton.style.display='block';recordButton.style.display='block';switchCameraButton.style.display='block';
            }).catch(()=>showError('Nu s-a putut accesa camera.'));
        }
        function switchCamera(){useFrontCamera=!useFrontCamera;if(currentStream)currentStream.getTracks().forEach(t=>t.stop());activateCamera();}
        function takePicture(){
            recordButton.style.display='none';switchCameraButton.style.display='none';
            try{canvas.width=video.videoWidth;canvas.height=video.videoHeight;const ctx=canvas.getContext('2d');
                if(useFrontCamera){ctx.translate(canvas.width,0);ctx.scale(-1,1);}
                ctx.drawImage(video,0,0,canvas.width,canvas.height);if(useFrontCamera)ctx.setTransform(1,0,0,1,0,0);
                const url=canvas.toDataURL('image/jpeg',0.85);currentMediaData=dataURLtoBlob(url);currentMediaType='image';showPreview(url,'image');
            }catch(e){showError('Nu s-a putut captura.');}
        }
        let recordingStartTime=0, qualityTimer=null, switchingToLowQuality=false, lowQualityChunks=[];

        function switchToLowQuality(mimeType){
            if(!mediaRecorder||mediaRecorder.state!=='recording') return;
            switchingToLowQuality=true;
            lowQualityChunks=[];
            mediaRecorder.stop(); // triggers onstop which won't show preview
            setTimeout(()=>{
                // Start new recorder at lower bitrate, appending to existing chunks
                try{
                    const lr=new MediaRecorder(currentStream,getRecorderOptions(mimeType,true));
                    lr.ondataavailable=e=>{if(e.data.size>0){chunks.push(e.data);}};
                    lr.onstop=()=>{
                        switchingToLowQuality=false;
                        const blob=new Blob(chunks,{type:lr.mimeType||'video/webm'});
                        currentMediaData=blob;currentMediaType='video';
                        showPreview(URL.createObjectURL(blob),'video');
                    };
                    mediaRecorder=lr;
                    lr.start(1000);
                    switchingToLowQuality=false;
                }catch(e){
                    switchingToLowQuality=false;
                    // fallback: just show whatever we have
                    const blob=new Blob(chunks,{type:'video/webm'});
                    currentMediaData=blob;currentMediaType='video';
                    showPreview(URL.createObjectURL(blob),'video');
                }
            },100);
        }

        function startRecording(){chunks=[];captureButton.style.display='none';switchCameraButton.style.display='none';
            try{const m=getSupportedMimeType();
                // Start with high quality — we'll know actual duration only when stopped
                mediaRecorder=new MediaRecorder(video.srcObject,getRecorderOptions(m,false));
                mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
                mediaRecorder.onstop=()=>{
                    const blob=new Blob(chunks,{type:mediaRecorder.mimeType||'video/webm'});
                    currentMediaData=blob;currentMediaType='video';
                    // If this was the high-quality phase and we switched to low-quality,
                    // lowQualityRecorder handles the rest — don't show preview yet
                    if(!switchingToLowQuality) showPreview(URL.createObjectURL(blob),'video');
                };
                recordingStartTime=Date.now();
                mediaRecorder.start(1000);stopRecordButton.style.display='block';recordButton.style.display='none';
                // After 30s, seamlessly restart at lower bitrate
                qualityTimer=setTimeout(()=>switchToLowQuality(m),30000);
                // No time limit — user stops manually
            }catch(e){showError('Nu s-a putut înregistra.');captureButton.style.display='block';}
        }
        function stopRecording(){if(qualityTimer){clearTimeout(qualityTimer);qualityTimer=null;}if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();stopRecordButton.style.display='none';}
        function showPreview(src,type){
            video.style.display='none';captureButton.style.display='none';recordButton.style.display='none';
            info.style.display='none';switchCameraButton.style.display='none';
            if(type==='image'){previewImage.src=src;previewImage.style.display='block';previewVideo.style.display='none';}
            else{previewVideo.src=src;previewVideo.style.display='block';previewImage.style.display='none';}
            saveButton.style.display='block';downloadButton.style.display='block';repetatiButton.style.display='block';
        }
        // Background upload queue — never blocks the UI
        const uploadQueue=[];
        let uploadBadge=null;

        function showUploadBadge(count){
            if(!uploadBadge){
                uploadBadge=document.createElement('div');
                uploadBadge.style.cssText='position:fixed;bottom:80px;right:14px;z-index:100;background:rgba(0,0,0,0.75);color:#fff;font-size:0.75rem;font-weight:600;padding:6px 12px;border-radius:50px;backdrop-filter:blur(8px);letter-spacing:-0.01em;transition:opacity 0.3s;';
                document.body.appendChild(uploadBadge);
            }
            if(count===0){uploadBadge.style.opacity='0';setTimeout(()=>{if(uploadBadge){uploadBadge.remove();uploadBadge=null;}},400);}
            else{uploadBadge.style.opacity='1';uploadBadge.textContent=`↑ Se salvează (${count})…`;}
        }

        async function uploadToCloud(blob,filename){
            const ref=storage.ref().child('amintiri/'+filename),task=ref.put(blob);
            return new Promise((res,rej)=>task.on('state_changed',null,rej,
                async()=>{try{const url=await task.snapshot.ref.getDownloadURL();res({downloadURL:url,fullPath:task.snapshot.ref.fullPath});}catch(e){rej(e);}}
            ));
        }

        function enqueueUpload(blob,type){
            const ts=new Date().toISOString().replace(/[:.]/g,'-');
            const filename=type+'_'+ts+'.'+(type==='image'?'jpg':'webm');
            uploadQueue.push({blob,type,filename});
            processQueue();
        }

        let uploading=false;
        async function processQueue(){
            if(uploading||uploadQueue.length===0)return;
            uploading=true;
            showUploadBadge(uploadQueue.length);
            while(uploadQueue.length>0){
                const job=uploadQueue[0];
                try{
                    if(!isAuthenticated)await signInAnonymously();
                    const result=await uploadToCloud(job.blob,job.filename);
                    saveMetadataToLocal({id:job.filename,type:job.type,date:new Date().toISOString(),fileName:job.filename,cloudURL:result.downloadURL,cloudPath:result.fullPath});
                }catch(e){
                    // Retry once, then save metadata locally without cloud URL
                    try{
                        const result=await uploadToCloud(job.blob,job.filename);
                        saveMetadataToLocal({id:job.filename,type:job.type,date:new Date().toISOString(),fileName:job.filename,cloudURL:result.downloadURL,cloudPath:result.fullPath});
                    }catch(e2){
                        saveMetadataToLocal({id:job.filename,type:job.type,date:new Date().toISOString(),isLocal:true});
                    }
                }
                uploadQueue.shift();
                showUploadBadge(uploadQueue.length);
            }
            uploading=false;
        }

        function saveToCloud(){
            if(!currentMediaData){showError('Nu există date.');return;}
            // Enqueue and immediately return control to user
            enqueueUpload(currentMediaData,currentMediaType);
            showSuccessMessage();
        }
        function saveToLocal(){progressContainer.style.display='block';updateProgress(40);
            try{saveMetadataToLocal({id:`${currentMediaType}_${Date.now()}`,type:currentMediaType,date:new Date().toISOString(),isLocal:true});updateProgress(100);setTimeout(()=>{showSuccessMessage();showSuccess('Salvat local!');},400);}
            catch{showError('Eroare.');progressContainer.style.display='none';}
        }
        function saveMetadataToLocal(m){let arr=[];try{arr=JSON.parse(localStorage.getItem('amintiriEla')||'[]');}catch{}arr.push(m);localStorage.setItem('amintiriEla',JSON.stringify(arr));}
        function downloadMedia(){try{const a=document.createElement('a');a.href=URL.createObjectURL(currentMediaData);a.download=`ela_${new Date().toISOString().replace(/[:.]/g,'-')}.${currentMediaType==='image'?'jpg':'webm'}`;document.body.appendChild(a);a.click();document.body.removeChild(a);showSuccess('Descărcat!');}catch{showError('Nu s-a putut descărca.');}}
        function showSuccessMessage(){
            if(currentStream){currentStream.getTracks().forEach(t=>t.stop());currentStream=null;}
            [repetatiButton,saveButton,downloadButton].forEach(b=>b.style.display='none');
            previewImage.style.display='none';previewVideo.style.display='none';progressContainer.style.display='none';
            info.textContent='Amintirea a fost trimisă spre salvare';info.style.display='block';
            const bc=document.getElementById('buttonContainer');bc.innerHTML='';
            const b1=document.createElement('button');b1.textContent='Fă o nouă amintire';b1.className='btn-dark';b1.onclick=resetApp;bc.appendChild(b1);
            const b2=document.createElement('button');b2.textContent='Vezi albumul';b2.className='btn-soft';b2.onclick=()=>window.location.href='gallery.html';bc.appendChild(b2);
        }
        function resetApp(){chunks=[];cameraDeschisa=false;currentMediaData=null;currentMediaType=null;
            const bc=document.getElementById('buttonContainer');bc.innerHTML='';
            [startButton,captureButton,recordButton,stopRecordButton,repetatiButton,saveButton,downloadButton,switchCameraButton].forEach(b=>bc.appendChild(b));
            document.getElementById('tapToStart').style.display='flex';info.style.display='none';startButton.style.display='none';
            [captureButton,recordButton,stopRecordButton,repetatiButton,saveButton,downloadButton,switchCameraButton].forEach(b=>b.style.display='none');
            [previewImage,previewVideo,video].forEach(el=>el.style.display='none');
            progressContainer.style.display='none';errorMessage.style.display='none';successMessage.style.display='none';saveButton.disabled=false;
        }
        function repeatCapture(){if(qualityTimer){clearTimeout(qualityTimer);qualityTimer=null;}chunks=[];switchingToLowQuality=false;currentMediaData=null;
            if(currentStream){video.srcObject=currentStream;video.style.display='block';}else{activateCamera();}
            [previewImage,previewVideo].forEach(el=>el.style.display='none');
            [saveButton,downloadButton,repetatiButton,stopRecordButton].forEach(b=>b.style.display='none');
            [captureButton,recordButton,switchCameraButton].forEach(b=>b.style.display='block');
            info.style.display='none';document.getElementById('tapToStart').style.display='none';
            progressContainer.style.display='none';errorMessage.style.display='none';successMessage.style.display='none';
        }

        startButton.addEventListener('click',activateCamera);
        document.getElementById('tapToStart').addEventListener('click',activateCamera);
        captureButton.addEventListener('click',takePicture);
        recordButton.addEventListener('click',startRecording);
        stopRecordButton.addEventListener('click',stopRecording);
        repetatiButton.addEventListener('click',repeatCapture);
        saveButton.addEventListener('click',saveToCloud);
        downloadButton.addEventListener('click',downloadMedia);
        switchCameraButton.addEventListener('click',switchCamera);

        window.addEventListener('load',async()=>{
            if(!navigator.mediaDevices)showError('Browser-ul nu suportă camera.');
            if(auth){try{await signInAnonymously();}catch{authStatus.textContent='Offline';authStatus.style.color='#c0392b';}}
            else{authStatus.textContent='Offline';authStatus.style.color='#c0392b';}
        });
        let lastTouch=0;
        document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouch<=300)e.preventDefault();lastTouch=n;},false);
    </script>
</body>
</html>
