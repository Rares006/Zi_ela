<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🖼️ Amintiri cu Ela</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: #fff8f0;
        }

        .bg-gradient {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 5% 15%, #dcfce7 0%, transparent 45%),
                radial-gradient(ellipse at 95% 5%, #fce7f3 0%, transparent 45%);
            background-color: #fff8f0;
            z-index: 0;
        }

        /* Stickers */
        .sticker {
            position: fixed; pointer-events: none; z-index: 1;
            object-fit: contain;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.08));
            animation: stickerFloat ease-in-out infinite;
        }
        @keyframes stickerFloat {
            0%,100% { transform: translateY(0) rotate(var(--rot)); }
            50%      { transform: translateY(-7px) rotate(var(--rot)); }
        }

        /* Top bar */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 14px;
            z-index: 50;
        }
        .back-button {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white; padding: 8px 16px;
            border-radius: 50px;
            font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 0.85rem;
            text-decoration: none;
            box-shadow: 0 3px 10px rgba(34,197,94,0.35);
        }

        /* Main screen — fills viewport, no scroll */
        .screen {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            padding: 64px 14px 12px;
        }

        /* Header */
        .page-header {
            text-align: center; margin-bottom: 10px;
            animation: bounceIn 0.6s ease-out;
            flex-shrink: 0;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.7); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .header-animals {
            display: flex; justify-content: center; align-items: flex-end; gap: 6px;
            margin-bottom: 4px;
        }
        .header-animals img {
            height: clamp(36px, 9vw, 52px);
            object-fit: contain;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.08));
            animation: gentleBounce ease-in-out infinite;
        }
        @keyframes gentleBounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);} }
        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(1.3rem, 5.5vw, 1.9rem);
            font-weight: 800; color: #15803d;
        }
        .header-sub { font-size: clamp(0.7rem, 2.5vw, 0.85rem); color: #9ca3af; margin-top: 2px; }

        /* Filter buttons */
        .filter-row {
            display: flex; gap: 8px; margin-bottom: 10px;
            flex-shrink: 0;
        }
        .filter-button {
            font-family: 'Baloo 2', cursive; font-weight: 700;
            font-size: clamp(0.72rem, 2.5vw, 0.85rem);
            padding: 7px 16px; border-radius: 50px; border: none; cursor: pointer;
            background: white; color: #9ca3af;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
        }
        .filter-button.active {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white; box-shadow: 0 3px 12px rgba(74,222,128,0.4);
        }

        /* Error */
        .error-msg {
            color: #ef4444; font-size: 0.82rem; font-weight: 600;
            padding: 7px 14px; background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 12px; margin-bottom: 8px; display: none;
            flex-shrink: 0; width: 100%; text-align: center;
        }

        /* Gallery grid — scrollable area in the middle */
        .gallery-wrapper {
            flex: 1; width: 100%; min-height: 0;
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .gallery-wrapper::-webkit-scrollbar { display: none; }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 4px 2px 8px;
        }

        .gallery-item {
            border-radius: 14px; overflow: hidden; cursor: pointer;
            aspect-ratio: 1; position: relative;
            background: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .gallery-item:active { transform: scale(0.95); border-color: #f9a8d4; }

        .media-container { width:100%; height:100%; position:relative; overflow:hidden; }
        .gallery-item img, .gallery-item video {
            width:100%; height:100%; object-fit:cover;
        }
        .play-overlay {
            position:absolute; inset:0;
            display:flex; align-items:center; justify-content:center;
            background: rgba(0,0,0,0.15);
        }
        .play-btn {
            width:36px; height:36px;
            background:rgba(255,255,255,0.9);
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:14px; box-shadow:0 2px 8px rgba(0,0,0,0.15);
        }
        .play-btn::before { content:'▶'; margin-left:2px; }

        .item-type-badge {
            position:absolute; top:5px; right:5px;
            background:rgba(0,0,0,0.45);
            color:white; font-size:0.6rem; font-weight:700;
            padding:2px 6px; border-radius:20px;
            text-transform:uppercase; letter-spacing:0.5px;
        }

        /* Loading */
        .loading-msg {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:12px;
            color:#9ca3af; font-family:'Baloo 2',cursive; font-size:1rem;
        }
        .spinner {
            width:38px; height:38px;
            border:4px solid #f3f4f6;
            border-top:4px solid #4ade80;
            border-right:4px solid #f472b6;
            border-radius:50%; animation:spin 0.8s linear infinite;
        }
        @keyframes spin { 100%{transform:rotate(360deg);} }

        /* Empty */
        .empty-msg {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:12px;
            text-align:center;
        }
        .empty-animals { display:flex; gap:8px; }
        .empty-animals img { height:clamp(55px,15vw,75px); object-fit:contain; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.08)); animation:gentleBounce ease-in-out infinite; }
        .empty-text { font-family:'Baloo 2',cursive; font-size:1rem; font-weight:700; color:#9ca3af; }
        .add-btn {
            background:linear-gradient(135deg,#f472b6,#ec4899);
            color:white; padding:12px 26px;
            border:none; border-radius:50px;
            font-family:'Baloo 2',cursive; font-weight:800; font-size:1rem;
            cursor:pointer;
            box-shadow:0 5px 16px rgba(244,114,182,0.4);
            transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .add-btn:active { transform:scale(0.95); }

        /* Modal */
        .modal {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.93);
            z-index:2000; flex-direction:column;
            align-items:center; justify-content:center;
            padding:14px;
        }
        .modal-content {
            max-width:100%; max-height:78vh;
            display:flex; align-items:center; justify-content:center;
            animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn { from{transform:scale(0.7);opacity:0;} to{transform:scale(1);opacity:1;} }
        .modal-content img, .modal-content video {
            max-width:100%; max-height:100%;
            object-fit:contain; border-radius:16px;
            box-shadow:0 16px 50px rgba(0,0,0,0.4);
        }
        .modal-counter {
            position:absolute; top:14px; left:14px;
            background:rgba(255,255,255,0.15); color:white;
            padding:6px 14px; border-radius:50px;
            font-family:'Baloo 2',cursive; font-size:0.85rem; font-weight:700;
            z-index:2001;
        }
        .close-btn {
            position:absolute; top:14px; right:14px;
            width:46px; height:46px;
            background:rgba(255,255,255,0.15); border:none;
            border-radius:50%; color:white; font-size:1.2rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            z-index:2001; transition:all 0.3s ease;
        }
        .close-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.9); }
        .nav-btn {
            position:absolute; top:50%; transform:translateY(-50%);
            width:46px; height:46px;
            background:rgba(255,255,255,0.15); border:none;
            border-radius:50%; color:white; font-size:1.3rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            z-index:2001; transition:all 0.3s ease;
        }
        .nav-btn:active { background:rgba(255,255,255,0.3); }
        .nav-btn:disabled { opacity:0.2; }
        .prev-btn { left:14px; }
        .next-btn { right:14px; }

        .placeholder {
            width:100%; height:100%;
            background:linear-gradient(135deg,#fce7f3,#dcfce7);
            display:flex; align-items:center; justify-content:center;
            font-size:2rem;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Stickers -->
    <img src="61e5c12a-b99c-4121-bc68-9a092b484377.png" class="sticker" style="width:46px;top:7%;left:4%;--rot:-18deg;animation-duration:3.2s;opacity:0.32;">
    <img src="b5591582-6b09-4735-b732-c1481db7e05a.png" class="sticker" style="width:50px;top:5%;right:4%;--rot:22deg;animation-duration:2.8s;animation-delay:0.5s;opacity:0.32;">
    <img src="3e637e7a-e1e1-49e3-8b77-fcd5dc61ca5b.png" class="sticker" style="width:44px;bottom:14%;left:2%;--rot:28deg;animation-duration:3.5s;animation-delay:1s;opacity:0.3;">
    <img src="e80ac0ef-d369-4110-b0d1-7228cd6d5ef3.png" class="sticker" style="width:48px;bottom:10%;right:2%;--rot:-22deg;animation-duration:3s;animation-delay:0.3s;opacity:0.3;">

    <div class="top-bar">
        <a href="index.html" class="back-button">← Înapoi</a>
    </div>

    <div class="screen">

        <div class="page-header">
            <div class="header-animals">
                <img src="8253a088-3266-48ce-812d-2e44ced702d3.png" style="animation-duration:2.2s;" alt="">
                <img src="fbf06e1a-ed14-4ac5-9dfd-ca9a3d79e6d4.png" style="animation-duration:2.7s;animation-delay:0.3s;" alt="">
                <img src="d3f58b6a-b357-400b-8ad1-885dfd0e2900.png" style="animation-duration:2.4s;animation-delay:0.6s;" alt="">
            </div>
            <h1>🎀 Amintiri cu Ela</h1>
            <p class="header-sub">Primul anișor în poze și video</p>
        </div>

        <div class="filter-row">
            <button class="filter-button active" data-filter="all">🌟 Toate</button>
            <button class="filter-button" data-filter="image">📷 Poze</button>
            <button class="filter-button" data-filter="video">🎥 Video</button>
        </div>

        <div class="error-msg" id="errorMessage"></div>

        <div id="loadingMessage" class="loading-msg">
            <div class="spinner"></div>
            <p>Se încarcă amintirile... 🎂</p>
        </div>

        <div class="gallery-wrapper" id="galleryWrapper" style="display:none;">
            <div class="gallery-container" id="galleryContainer"></div>
        </div>

        <div id="emptyMessage" style="display:none;">
            <div class="empty-msg">
                <div class="empty-animals">
                    <img src="d3f58b6a-b357-400b-8ad1-885dfd0e2900.png" style="animation-duration:2.3s;" alt="">
                    <img src="65189b18-95f1-47fa-9dd1-a1665ad10f48.png" style="animation-duration:2.8s;animation-delay:0.3s;" alt="">
                </div>
                <p class="empty-text">🐾 Nu sunt încă amintiri cu Ela!</p>
                <button class="add-btn" onclick="window.location.href='camera2.html'">📸 Fă prima poză cu Ela!</button>
            </div>
        </div>

    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-counter" id="modalCounter">1 / 1</div>
        <button class="close-btn" id="closeBtn">✕</button>
        <button class="nav-btn prev-btn" id="prevBtn">‹</button>
        <button class="nav-btn next-btn" id="nextBtn">›</button>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-storage-compat.min.js"></script>
    <script>
        const firebaseConfig = {
            apiKey:"AIzaSyD71N51FaHL7lvjQ3r3cVqCqw1fhrrr4Ng",
            authDomain:"ziua-ela.firebaseapp.com",
            projectId:"ziua-ela",
            storageBucket:"ziua-ela.firebasestorage.app",
            messagingSenderId:"180855324306",
            appId:"1:180855324306:web:bb5f4aeabb1ca1847e304b"
        };
        let firebaseApp, storage, auth, isAuthenticated=false;
        try{firebaseApp=firebase.initializeApp(firebaseConfig);storage=firebase.storage();auth=firebase.auth();}catch(e){}

        let allMemories=[], filteredMemories=[], currentFilter='all', currentModalIndex=0;

        const galleryWrapper   = document.getElementById('galleryWrapper');
        const galleryContainer = document.getElementById('galleryContainer');
        const emptyMessage     = document.getElementById('emptyMessage');
        const loadingMessage   = document.getElementById('loadingMessage');
        const errorMsg         = document.getElementById('errorMessage');
        const modal            = document.getElementById('modal');
        const modalContent     = document.getElementById('modalContent');
        const modalCounter     = document.getElementById('modalCounter');
        const closeBtn         = document.getElementById('closeBtn');
        const prevBtn          = document.getElementById('prevBtn');
        const nextBtn          = document.getElementById('nextBtn');

        function showError(m){errorMsg.textContent=m;errorMsg.style.display='block';setTimeout(()=>errorMsg.style.display='none',5000);}

        async function signInAnonymously(){const c=await auth.signInAnonymously();isAuthenticated=true;return c.user;}

        async function loadCloudMemories(){
            if(!storage||!isAuthenticated)return[];
            try{
                const r=await storage.ref().child('amintiri').listAll();
                const mems=[];
                for(const item of r.items){
                    try{
                        const url=await item.getDownloadURL();
                        const meta=await item.getMetadata();
                        mems.push({id:item.name,type:item.name.startsWith('image_')?'image':'video',date:meta.timeCreated,cloudURL:url,cloudPath:item.fullPath});
                    }catch(e){}
                }
                return mems;
            }catch(e){return[];}
        }

        function createGalleryItem(memory, index){
            const item=document.createElement('div');
            item.className='gallery-item';
            const mc=document.createElement('div'); mc.className='media-container';

            if(memory.cloudURL){
                if(memory.type==='image'){
                    const img=document.createElement('img'); img.src=memory.cloudURL; img.loading='lazy'; mc.appendChild(img);
                } else {
                    const vid=document.createElement('video'); vid.src=memory.cloudURL; vid.muted=true; vid.preload='metadata'; mc.appendChild(vid);
                    const ov=document.createElement('div'); ov.className='play-overlay';
                    const pb=document.createElement('div'); pb.className='play-btn'; ov.appendChild(pb); mc.appendChild(ov);
                }
                const badge=document.createElement('div'); badge.className='item-type-badge';
                badge.textContent=memory.type==='image'?'📷':'🎥'; mc.appendChild(badge);
            } else {
                const ph=document.createElement('div'); ph.className='placeholder';
                ph.textContent=memory.type==='image'?'📷':'🎥'; mc.appendChild(ph);
            }

            item.appendChild(mc);
            item.addEventListener('click',()=>openModal(index));
            return item;
        }

        function openModal(index){
            currentModalIndex=index; displayModal();
            modal.style.display='flex'; document.body.style.overflow='hidden';
            updateNavBtns();
        }
        function displayModal(){
            const m=filteredMemories[currentModalIndex]; if(!m)return;
            modalContent.innerHTML='';
            if(m.type==='image'&&m.cloudURL){const img=document.createElement('img');img.src=m.cloudURL;modalContent.appendChild(img);}
            else if(m.type==='video'&&m.cloudURL){const vid=document.createElement('video');vid.controls=true;vid.src=m.cloudURL;modalContent.appendChild(vid);}
            else{const ph=document.createElement('div');ph.className='placeholder';ph.style.cssText='width:260px;height:260px;border-radius:16px;';ph.textContent=m.type==='image'?'📷':'🎥';modalContent.appendChild(ph);}
            modalCounter.textContent=`${currentModalIndex+1} / ${filteredMemories.length}`;
        }
        function closeModal(){
            modal.style.display='none'; document.body.style.overflow='hidden';
            modalContent.querySelectorAll('video').forEach(v=>{v.pause();v.currentTime=0;});
        }
        function updateNavBtns(){prevBtn.disabled=currentModalIndex===0;nextBtn.disabled=currentModalIndex===filteredMemories.length-1;}

        closeBtn.addEventListener('click',closeModal);
        prevBtn.addEventListener('click',()=>{if(currentModalIndex>0){currentModalIndex--;displayModal();updateNavBtns();}});
        nextBtn.addEventListener('click',()=>{if(currentModalIndex<filteredMemories.length-1){currentModalIndex++;displayModal();updateNavBtns();}});
        modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
        document.addEventListener('keydown',e=>{if(modal.style.display==='flex'){if(e.key==='Escape')closeModal();else if(e.key==='ArrowLeft'&&currentModalIndex>0){currentModalIndex--;displayModal();updateNavBtns();}else if(e.key==='ArrowRight'&&currentModalIndex<filteredMemories.length-1){currentModalIndex++;displayModal();updateNavBtns();}}});

        // Swipe in modal
        let tx=0;
        modal.addEventListener('touchstart',e=>tx=e.changedTouches[0].screenX);
        modal.addEventListener('touchend',e=>{const diff=tx-e.changedTouches[0].screenX;if(Math.abs(diff)>50){if(diff>0&&currentModalIndex<filteredMemories.length-1){currentModalIndex++;displayModal();updateNavBtns();}else if(diff<0&&currentModalIndex>0){currentModalIndex--;displayModal();updateNavBtns();}}});

        function filterMemories(f){
            currentFilter=f;
            document.querySelectorAll('.filter-button').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
            filteredMemories=f==='all'?[...allMemories]:allMemories.filter(m=>m.type===f);
            displayMemories(filteredMemories);
        }
        function displayMemories(mems){
            galleryContainer.innerHTML='';
            if(mems.length===0){
                loadingMessage.style.display='none'; galleryWrapper.style.display='none'; emptyMessage.style.display='flex'; return;
            }
            mems.forEach((m,i)=>galleryContainer.appendChild(createGalleryItem(m,i)));
            loadingMessage.style.display='none'; emptyMessage.style.display='none'; galleryWrapper.style.display='block';
        }

        document.querySelectorAll('.filter-button').forEach(b=>b.addEventListener('click',()=>filterMemories(b.dataset.filter)));

        async function loadAll(){
            try{
                let cloud=[];
                if(auth){try{await signInAnonymously();cloud=await loadCloudMemories();}catch(e){}}
                allMemories=cloud.sort((a,b)=>new Date(b.date)-new Date(a.date));
                filterMemories(currentFilter);
            }catch(e){showError('Eroare la încărcare.');loadingMessage.style.display='none';emptyMessage.style.display='flex';}
        }

        window.addEventListener('load',loadAll);
        document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadAll();});

        let lastTouch=0;
        document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouch<=300)e.preventDefault();lastTouch=n;},false);
    </script>
</body>
</html>
