<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Albumul Elarei</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#faf8f5;--surface:rgba(255,255,255,0.75);--border:rgba(0,0,0,0.07);--text:#1a1a1a;--text-2:#6e6e73;--text-3:#aeaeb2;--accent:#e8697a;--green:#34c759;--blue:#007aff;}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);}
        .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 55% 40% at 10% 10%,rgba(200,240,210,0.15) 0%,transparent 70%),radial-gradient(ellipse 50% 35% at 90% 90%,rgba(255,200,200,0.13) 0%,transparent 70%);background-color:var(--bg);}
        .sticker{position:fixed;pointer-events:none;z-index:1;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.06));animation:stickerFloat ease-in-out infinite;}
        @keyframes stickerFloat{0%,100%{transform:translateY(0) rotate(var(--rot));}50%{transform:translateY(-6px) rotate(var(--rot));}}
        .top-bar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:50;}
        .back-button{display:flex;align-items:center;gap:2px;color:var(--green);font-size:0.93rem;font-weight:500;text-decoration:none;padding:6px 0;letter-spacing:-0.01em;}
        .back-button::before{content:'‹';font-size:1.4rem;line-height:1;}
        .upload-btn{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.055);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;font-weight:500;font-size:0.85rem;padding:8px 16px;border-radius:50px;border:none;cursor:pointer;letter-spacing:-0.01em;}
        .upload-btn:active{opacity:0.65;transform:scale(0.96);}
        #fileInput{display:none;}
        .screen{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:62px 14px 12px;gap:8px;}
        .page-header{text-align:center;flex-shrink:0;}
        .header-animals{display:flex;justify-content:center;align-items:flex-end;gap:6px;margin-bottom:4px;}
        .header-animals img{height:clamp(30px,7.5vw,44px);object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.07));animation:bob ease-in-out infinite;}
        @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
        h1{font-family:'DM Serif Display',serif;font-size:clamp(1.2rem,5vw,1.6rem);font-weight:400;color:var(--text);letter-spacing:-0.025em;}
        .header-sub{font-size:clamp(0.68rem,2.2vw,0.78rem);color:var(--text-3);margin-top:2px;font-weight:400;}
        .filter-row{display:flex;gap:6px;flex-shrink:0;}
        .filter-button{font-family:'DM Sans',-apple-system,sans-serif;font-weight:500;font-size:clamp(0.75rem,2.5vw,0.84rem);padding:7px 16px;border-radius:50px;border:none;cursor:pointer;background:rgba(0,0,0,0.045);color:var(--text-2);transition:all 0.2s ease;letter-spacing:-0.01em;}
        .filter-button.active{background:var(--text);color:#fff;}
        #uploadProgress{width:100%;background:rgba(0,0,0,0.05);border-radius:50px;overflow:hidden;display:none;height:3px;flex-shrink:0;}
        #uploadBar{height:3px;background:var(--green);border-radius:50px;width:0%;transition:width 0.3s ease;}
        .msg{width:100%;text-align:center;flex-shrink:0;font-size:0.8rem;font-weight:500;padding:8px 14px;border-radius:10px;display:none;letter-spacing:-0.01em;}
        .msg-error{color:#c0392b;background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.12);}
        .msg-success{color:#1a7a36;background:rgba(52,199,89,0.1);border:1px solid rgba(52,199,89,0.18);}
        .gallery-wrapper{flex:1;width:100%;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
        .gallery-wrapper::-webkit-scrollbar{display:none;}
        .gallery-container{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:2px 0 8px;}
        .gallery-item{border-radius:14px;overflow:hidden;cursor:pointer;aspect-ratio:1;position:relative;background:rgba(0,0,0,0.04);transition:transform 0.15s,opacity 0.15s;}
        .gallery-item:active{transform:scale(0.94);opacity:0.85;}
        .media-container{width:100%;height:100%;position:relative;overflow:hidden;}
        .gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;}
        .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.1);}
        .play-btn{width:32px;height:32px;background:rgba(255,255,255,0.88);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
        .play-btn::before{content:'▶';margin-left:2px;}
        .item-badge{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.36);color:white;font-size:0.55rem;font-weight:600;padding:2px 5px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;}
        .loading-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-3);font-size:0.9rem;}
        .spinner{width:28px;height:28px;border:2.5px solid rgba(0,0,0,0.07);border-top:2.5px solid var(--text-2);border-radius:50%;animation:spin 0.7s linear infinite;}
        @keyframes spin{100%{transform:rotate(360deg);}}
        .empty-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;}
        .empty-animals{display:flex;gap:8px;}
        .empty-animals img{height:clamp(46px,12vw,64px);object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.07));animation:bob ease-in-out infinite;}
        .empty-text{font-size:0.9rem;font-weight:400;color:var(--text-2);letter-spacing:-0.01em;}
        .add-btn{background:var(--text);color:#fff;padding:12px 24px;border:none;border-radius:50px;font-family:'DM Sans',-apple-system,sans-serif;font-weight:500;font-size:0.9rem;cursor:pointer;letter-spacing:-0.01em;transition:opacity 0.13s,transform 0.13s;}
        .add-btn:active{opacity:0.7;transform:scale(0.96);}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:2000;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
        .modal-content{max-width:100%;max-height:76vh;display:flex;align-items:center;justify-content:center;animation:popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);}
        @keyframes popIn{from{transform:scale(0.78);opacity:0;}to{transform:scale(1);opacity:1;}}
        .modal-content img,.modal-content video{max-width:100%;max-height:100%;object-fit:contain;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
        .modal-counter{position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);padding:5px 12px;border-radius:50px;font-size:0.78rem;font-weight:500;z-index:2001;letter-spacing:-0.01em;}
        .close-btn{position:absolute;top:16px;right:16px;width:38px;height:38px;background:rgba(255,255,255,0.12);border:none;border-radius:50%;color:rgba(255,255,255,0.8);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2001;}
        .close-btn:active{background:rgba(255,255,255,0.22);}
        .nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;background:rgba(255,255,255,0.12);border:none;border-radius:50%;color:rgba(255,255,255,0.8);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2001;}
        .nav-btn:active{background:rgba(255,255,255,0.22);}
        .nav-btn:disabled{opacity:0.2;cursor:not-allowed;}
        .prev-btn{left:12px;}.next-btn{right:12px;}
        .modal-actions{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2001;}
        .modal-action-btn{font-family:'DM Sans',-apple-system,sans-serif;font-weight:500;font-size:0.82rem;padding:9px 18px;border:none;border-radius:50px;cursor:pointer;letter-spacing:-0.01em;transition:opacity 0.13s,transform 0.13s;}
        .modal-action-btn:active{opacity:0.65;transform:scale(0.95);}
        .btn-dl{background:rgba(255,255,255,0.15);color:#fff;}
    </style>
</head>

    <img src="8253a088-3266-48ce-812d-2e44ced702d3.png" class="sticker" style="width:52px;top:87%;left:4%;--rot:12deg;animation-duration:3.4s;animation-delay:0.8s;opacity:0.34;">

    <input type="file" id="fileInput" accept="image/*,video/*" multiple>

                <img src="3e637e7a-e1e1-49e3-8b77-fcd5dc61ca5b.png" style="animation-duration:2.5s;" alt="">

        <div class="modal-actions"><button class="modal-action-btn btn-dl" id="modalDownloadBtn">↓ Descarcă</button></div>

    <script src="firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-storage-compat.min.js"></script>
    <script>
        let firebaseApp,storage,auth,isAuthenticated=false;
        firebaseApp=firebase.initializeApp(window.firebaseConfig);storage=firebase.storage();auth=firebase.auth();
        let allMemories=[],filteredMemories=[],currentFilter='all',currentModalIndex=0;
        const galleryWrapper=document.getElementById('galleryWrapper'),galleryContainer=document.getElementById('galleryContainer');
        const emptyMessage=document.getElementById('emptyMessage'),loadingMessage=document.getElementById('loadingMessage');
        const errorMsg=document.getElementById('errorMessage'),successMsg=document.getElementById('successMessage');
        const modal=document.getElementById('modal'),modalContent=document.getElementById('modalContent');
        const modalCounter=document.getElementById('modalCounter'),closeBtn=document.getElementById('closeBtn');
        const prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn');
        const modalDownloadBtn=document.getElementById('modalDownloadBtn');
        const uploadBtn=document.getElementById('uploadBtn'),fileInput=document.getElementById('fileInput');
        const uploadProgress=document.getElementById('uploadProgress'),uploadBar=document.getElementById('uploadBar');
        function showError(m){errorMsg.textContent=m;errorMsg.style.display='block';setTimeout(()=>errorMsg.style.display='none',5000);}
        function showSuccess(m){successMsg.textContent=m;successMsg.style.display='block';setTimeout(()=>successMsg.style.display='none',4000);}
        async function signInAnon(){if(isAuthenticated)return;const c=await auth.signInAnonymously();isAuthenticated=true;return c.user;}
        async function loadCloudMemories(){
            if(!storage||!isAuthenticated)return[];
            try{const r=await storage.ref().child('amintiri').listAll();const mems=[];
                for(const item of r.items){try{const url=await item.getDownloadURL();const meta=await item.getMetadata();
                    mems.push({id:item.name,type:item.name.startsWith('image_')?'image':'video',date:meta.timeCreated,cloudURL:url,cloudPath:item.fullPath,fileName:item.name});
                }catch(e){}}return mems;}catch(e){return[];}
        }
        uploadBtn.addEventListener('click',()=>fileInput.click());
        fileInput.addEventListener('change',async function(){
            const files=Array.from(this.files);if(!files.length)return;
            try{await signInAnon();}catch(e){showError('Nu s-a putut conecta.');return;}
            uploadProgress.style.display='block';let done=0;
            for(const file of files){try{
                const isImg=file.type.startsWith('image/'),ext=file.name.split('.').pop()||(isImg?'jpg':'webm');
                const ts=new Date().toISOString().replace(/[:.]/g,'-');
                const name=`${isImg?'image':'video'}_${ts}.${ext}`;
                const ref=storage.ref().child(`amintiri/${name}`),task=ref.put(file);
                await new Promise((res,rej)=>task.on('state_changed',s=>{const p=((done/files.length)*100)+((s.bytesTransferred/s.totalBytes)*100/files.length);uploadBar.style.width=p+'%';},rej,res));
                done++;}catch(e){showError('Eroare: '+file.name);}}
            uploadBar.style.width='100%';setTimeout(()=>{uploadProgress.style.display='none';uploadBar.style.width='0%';},1000);
            showSuccess(`${done} fișier${done>1?'e':''} adăugate!`);fileInput.value='';loadAll();
        });
        function createGalleryItem(memory,index){
            const item=document.createElement('div');item.className='gallery-item';
            const mc=document.createElement('div');mc.className='media-container';
            if(memory.cloudURL){
                if(memory.type==='image'){const img=document.createElement('img');img.src=memory.cloudURL;img.loading='lazy';mc.appendChild(img);}
                else{const vid=document.createElement('video');vid.src=memory.cloudURL;vid.muted=true;vid.preload='metadata';mc.appendChild(vid);
                    const ov=document.createElement('div');ov.className='play-overlay';const pb=document.createElement('div');pb.className='play-btn';ov.appendChild(pb);mc.appendChild(ov);}
                const badge=document.createElement('div');badge.className='item-badge';badge.textContent=memory.type==='image'?'foto':'video';mc.appendChild(badge);
            }else{const ph=document.createElement('div');ph.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;';ph.textContent=memory.type==='image'?'📷':'🎥';mc.appendChild(ph);}
            item.appendChild(mc);item.addEventListener('click',()=>openModal(index));return item;
        }
        function openModal(index){currentModalIndex=index;displayModal();modal.style.display='flex';document.body.style.overflow='hidden';updateNavBtns();}
        function displayModal(){const m=filteredMemories[currentModalIndex];if(!m)return;modalContent.innerHTML='';
            if(m.type==='image'&&m.cloudURL){const img=document.createElement('img');img.src=m.cloudURL;modalContent.appendChild(img);}
            else if(m.type==='video'&&m.cloudURL){const vid=document.createElement('video');vid.controls=true;vid.src=m.cloudURL;modalContent.appendChild(vid);}
            else{const ph=document.createElement('div');ph.style.cssText='width:240px;height:240px;border-radius:16px;background:#111;display:flex;align-items:center;justify-content:center;font-size:3rem;';ph.textContent=m.type==='image'?'📷':'🎥';modalContent.appendChild(ph);}
            modalCounter.textContent=`${currentModalIndex+1} / ${filteredMemories.length}`;
        }
        function closeModal(){modal.style.display='none';document.body.style.overflow='hidden';modalContent.querySelectorAll('video').forEach(v=>{v.pause();v.currentTime=0;});}
        function updateNavBtns(){prevBtn.disabled=currentModalIndex===0;nextBtn.disabled=currentModalIndex===filteredMemories.length-1;}
        modalDownloadBtn.addEventListener('click',async()=>{
            const m=filteredMemories[currentModalIndex];if(!m||!m.cloudURL)return;
            try{modalDownloadBtn.textContent='Se descarcă…';modalDownloadBtn.disabled=true;
                const resp=await fetch(m.cloudURL);const blob=await resp.blob();const url=URL.createObjectURL(blob);
                const a=document.createElement('a');a.href=url;a.download=`ela_${Date.now()}.${m.type==='image'?'jpg':'webm'}`;
                document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
                modalDownloadBtn.textContent='↓ Descarcă';modalDownloadBtn.disabled=false;
            }catch(e){modalDownloadBtn.textContent='↓ Descarcă';modalDownloadBtn.disabled=false;showError('Eroare descărcare.');}
        });
        closeBtn.addEventListener('click',closeModal);
        prevBtn.addEventListener('click',()=>{if(currentModalIndex>0){currentModalIndex--;displayModal();updateNavBtns();}});
        nextBtn.addEventListener('click',()=>{if(currentModalIndex<filteredMemories.length-1){currentModalIndex++;displayModal();updateNavBtns();}});
        modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
        document.addEventListener('keydown',e=>{if(modal.style.display==='flex'){if(e.key==='Escape')closeModal();else if(e.key==='ArrowLeft'&&currentModalIndex>0){currentModalIndex--;displayModal();updateNavBtns();}else if(e.key==='ArrowRight'&&currentModalIndex<filteredMemories.length-1){currentModalIndex++;displayModal();updateNavBtns();}}});
        let tx=0;
        modal.addEventListener('touchstart',e=>tx=e.changedTouches[0].screenX);
        modal.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].screenX;if(Math.abs(d)>50){if(d>0&&currentModalIndex<filteredMemories.length-1){currentModalIndex++;displayModal();updateNavBtns();}else if(d<0&&currentModalIndex>0){currentModalIndex--;displayModal();updateNavBtns();}}});
        function filterMemories(f){currentFilter=f;document.querySelectorAll('.filter-button').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));filteredMemories=f==='all'?[...allMemories]:allMemories.filter(m=>m.type===f);displayMemories(filteredMemories);}
        function displayMemories(mems){galleryContainer.innerHTML='';
            if(mems.length===0){loadingMessage.style.display='none';galleryWrapper.style.display='none';emptyMessage.style.display='flex';return;}
            mems.forEach((m,i)=>galleryContainer.appendChild(createGalleryItem(m,i)));
            loadingMessage.style.display='none';emptyMessage.style.display='none';galleryWrapper.style.display='block';}
        document.querySelectorAll('.filter-button').forEach(b=>b.addEventListener('click',()=>filterMemories(b.dataset.filter)));
        async function loadAll(){
            loadingMessage.style.display='flex';galleryWrapper.style.display='none';emptyMessage.style.display='none';
            try{let cloud=[];if(auth){try{await signInAnon();cloud=await loadCloudMemories();}catch(e){}}
                allMemories=cloud.sort((a,b)=>new Date(b.date)-new Date(a.date));filterMemories(currentFilter);
            }catch(e){showError('Eroare la încărcare.');loadingMessage.style.display='none';emptyMessage.style.display='flex';}
        }
        window.addEventListener('load',loadAll);
        document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadAll();});
        let lastTouch=0;document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouch<=300)e.preventDefault();lastTouch=n;},false);
    </script>
</body>
</html>
